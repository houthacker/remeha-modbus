name: pytest

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.14]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set PY env
        run: echo "PY=$(python -VV | sha256sum | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ github.workspace }}/requirements.test.txt
      - name: Run pytest
        id: run_pytest
        run: |
          output=$(pytest --cov-report=term-missing --junitxml=${{ github.workspace }}/junit-coverage.xml --cov=custom_components/remeha_modbus)
          echo -n $output | tee ${{ github.workspace }}/pytest-coverage.txt
      - name: Check for test failures
        if: ${{ failure() }}
        run: |
          echo ${{ steps.run_pytest.outcome }}
          exit 1

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            ${{ github.workspace }}/junit-coverage.xml
            ${{ github.workspace }}/pytest-coverage.txt
